services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:./data/dev.db"
      AUTH_SECRET: "${AUTH_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      B2_KEY_ID: "${B2_KEY_ID:-}"
      B2_APP_KEY: "${B2_APP_KEY:-}"
      B2_BUCKET_NAME: "${B2_BUCKET_NAME:-}"
      B2_ENDPOINT: "${B2_ENDPOINT:-}"
    volumes:
      - ./data:/app/data
